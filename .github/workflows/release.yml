name: Release

on:
  workflow_dispatch:
    inputs:
      force:
        description: "Force rebuild even if commit unchanged"
        required: false
        default: false
        type: boolean

concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  check:
    name: Check if build needed
    runs-on: ubuntu-latest
    outputs:
      should_build: ${{ steps.check.outputs.should_build }}
      short_hash: ${{ steps.info.outputs.short_hash }}
      date: ${{ steps.info.outputs.date }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Get commit info
        id: info
        run: |
          echo "short_hash=$(git rev-parse --short=7 HEAD)" >> "$GITHUB_OUTPUT"
          echo "date=$(date -u '+%Y%m%d')" >> "$GITHUB_OUTPUT"

      - name: Check existing release
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          FORCE: ${{ inputs.force }}
          TAG: dev-${{ steps.info.outputs.date }}-${{ steps.info.outputs.short_hash }}
        run: |
          if [[ "$FORCE" == "true" ]]; then
            echo "should_build=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if gh release view "$TAG" > /dev/null 2>&1; then
            echo "should_build=false" >> "$GITHUB_OUTPUT"
            echo "Skipping: release $TAG already exists"
          else
            echo "should_build=true" >> "$GITHUB_OUTPUT"
          fi

  build:
    name: Build (${{ matrix.artifact_name }})
    needs: check
    if: needs.check.outputs.should_build == 'true'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: ryo-linux-x64
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact_name: ryo-macos-arm64
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          prefix-key: release

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package binary
        env:
          ARTIFACT_NAME: ${{ matrix.artifact_name }}
          TARGET: ${{ matrix.target }}
          SHORT_HASH: ${{ needs.check.outputs.short_hash }}
        run: |
          ASSET_NAME="${ARTIFACT_NAME}-${SHORT_HASH}.tar.gz"
          mkdir staging
          cp "target/${TARGET}/release/ryo" staging/ryo
          tar czf "${ASSET_NAME}" -C staging ryo
          echo "ASSET_NAME=${ASSET_NAME}" >> "$GITHUB_ENV"

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ env.ASSET_NAME }}
          retention-days: 1

  release:
    name: Publish release
    needs: [check, build]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Delete previous nightly releases
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          for tag in $(gh release list --limit 10 --json tagName --jq '.[].tagName | select(startswith("dev-"))'); do
            echo "Deleting release: $tag"
            gh release delete "$tag" --yes --cleanup-tag
          done

      - name: Create release and upload assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SHORT_HASH: ${{ needs.check.outputs.short_hash }}
          DATE: ${{ needs.check.outputs.date }}
          REPO_NAME: ${{ github.repository }}
        run: |
          TAG="dev-${DATE}-${SHORT_HASH}"
          NOTES="Dev build from \`main\` at ${SHORT_HASH} (${DATE}).

          Install:
          \`\`\`sh
          curl -fsSL https://raw.githubusercontent.com/${REPO_NAME}/main/install.sh | sh
          \`\`\`"

          shopt -s globstar nullglob
          ASSETS=()
          for asset in artifacts/**/*.tar.gz; do
            ASSETS+=("$asset")
          done

          gh release create "$TAG" "${ASSETS[@]}" \
            --title "Dev ${DATE} (${SHORT_HASH})" --prerelease --notes "$NOTES"
